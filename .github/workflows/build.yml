name: Build-OS
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout-Code
        uses: actions/checkout@v3

      - name: Download-Kernel
        run: |
          echo "جاري تحميل كود النواة يا أحمد..."
          wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.9.tar.xz
          tar -xf linux-6.9.tar.xz
          ls -F
